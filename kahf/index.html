<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Learn Arabic - Surah Al-Kahf 18:60–82</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');

  :root {
    /* Deep blue-parchment palette — distinct from Maryam's green-beige */
    --bg-page-1: #EEE9DC;
    --bg-page-2: #DDD9CB;
    --bg-page-3: #B9C3CF;
    --bg-page-4: #C8B89A;

    --surface-1: rgba(252, 250, 244, 0.50);
    --surface-2: rgba(252, 250, 244, 0.72);
    --surface-strong: rgba(252, 250, 244, 0.88);

    --border: rgba(72, 95, 120, 0.16);
    --border-strong: rgba(60, 85, 112, 0.32);
    --border-accent: rgba(72, 108, 148, 0.48);
    --radius: 16px;

    --text-primary: #1E2A38;
    --text-secondary: #4A5F72;
    --text-muted: #7A8C9A;

    --bg-accent: rgba(72, 108, 148, 0.14);
    --text-accent: #2C5278;

    --bg-success: rgba(72, 130, 100, 0.16);
    --text-success: #2A5C40;

    --bg-warning: rgba(185, 148, 72, 0.22);
    --text-warning: #7A5C1A;

    --bg-pro: rgba(72, 100, 148, 0.16);
    --text-pro: #284868;

    --bg-danger: rgba(160, 80, 72, 0.16);
    --text-danger: #7A2C28;

    --glass-shadow: 0 8px 28px rgba(30, 42, 56, 0.14), 0 1px 0 rgba(255,255,255,0.6) inset;
    --glass-shadow-sm: 0 4px 14px rgba(30, 42, 56, 0.10), 0 1px 0 rgba(255,255,255,0.55) inset;

    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body, button, input, textarea {
    font-family: var(--font-sans);
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    position: relative;
    margin: 0;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    min-height: 100vh;
    min-height: 100dvh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(ellipse 900px 600px at 8% 0%, var(--bg-page-4) 0%, transparent 60%),
      radial-gradient(ellipse 900px 700px at 100% 15%, var(--bg-page-3) 0%, transparent 55%),
      radial-gradient(ellipse 800px 600px at 20% 100%, var(--bg-page-3) 0%, transparent 55%),
      linear-gradient(160deg, var(--bg-page-1), var(--bg-page-2));
  }

  .kahf-explorer {
    max-width: 720px;
    margin: 0 auto;
    padding: clamp(14px, 3vw, 28px);
    color: var(--text-primary);
  }

  /* ---- Home navigation ---- */
  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: none;
    margin-bottom: 10px;
    transition: color 0.15s ease;
  }
  .home-link:hover { color: var(--text-accent); }

  /* ---- Header ---- */
  .explorer-header { margin-bottom: 18px; padding: 0 2px; }
  .explorer-title {
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: clamp(19px, 4vw, 25px);
    color: var(--text-primary);
    margin: 2px 2px 2px 2px;
    line-height: 1.5;
    letter-spacing: 0.005em;
  }
  .explorer-subtitle {
    font-family: var(--font-sans);
    font-size: 12.5px;
    font-style: italic;
    color: var(--text-muted);
    margin: 5px 0 0;
    letter-spacing: 0.03em;
  }
  .surah-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: var(--bg-pro);
    color: var(--text-pro);
    border: 0.5px solid var(--border-accent);
    margin-top: 6px;
    font-family: monospace;
    letter-spacing: 0.04em;
  }

  /* ---- Verse picker ---- */
  .verse-buttons-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
    padding: 10px;
    border-radius: var(--radius);
    background: var(--surface-1);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 0.5px solid var(--border);
    box-shadow: var(--glass-shadow-sm);
  }

  .verse-btn {
    cursor: pointer;
    padding: 6px 12px;
    border: 0.5px solid var(--border-strong);
    border-radius: calc(var(--radius) - 6px);
    background: var(--surface-2);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 13px;
    transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    min-width: 44px;
    min-height: 44px;
    text-align: center;
  }
  .verse-btn:hover { background: var(--surface-strong); transform: translateY(-1px); box-shadow: var(--glass-shadow-sm); }
  .verse-btn:active { transform: translateY(0); }
  .verse-btn.active {
    background: linear-gradient(180deg, rgba(100,140,185,0.40), rgba(72,108,148,0.26));
    border-color: var(--border-accent);
    color: var(--text-accent);
    font-weight: 600;
    box-shadow: var(--glass-shadow-sm);
  }

  /* ---- Glass panels ---- */
  .glass-panel {
    background: var(--surface-1);
    backdrop-filter: blur(20px) saturate(170%);
    -webkit-backdrop-filter: blur(20px) saturate(170%);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--glass-shadow);
    position: relative;
    overflow: hidden;
  }
  .glass-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0) 40%);
    pointer-events: none;
  }

  .verse-card { padding: 18px 20px; margin-bottom: 14px; }
  .verse-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.02em; }
  .verse-transliteration { font-size: 12px; color: var(--text-secondary); margin-top: 8px; font-style: italic; }
  .verse-translation { font-size: 12px; color: var(--text-primary); margin-top: 6px; line-height: 1.5; }

  .verse-summary { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin: 4px 2px 8px; }

  .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin: 2px 4px 2px 0; letter-spacing: 0.01em; }
  .tag-verb { background: var(--bg-success); color: var(--text-success); }
  .tag-noun { background: var(--bg-accent); color: var(--text-accent); }
  .tag-particle { background: var(--bg-warning); color: var(--text-warning); }
  .tag-structure { background: var(--bg-pro); color: var(--text-pro); }
  .tag-rhyme { background: var(--bg-danger); color: var(--text-danger); }

  .arabic-large {
    font-family: 'Amiri', serif;
    font-size: clamp(22px, 5vw, 25px);
    direction: rtl;
    text-align: right;
    line-height: 1.9;
    color: var(--text-primary);
  }

  .analysis-block { padding: 14px 16px; margin-top: 10px; }
  .grammar-item { display: flex; flex-direction: column; gap: 4px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .grammar-item:last-child { border-bottom: none; }
  .grammar-word { font-family: 'Amiri', serif; font-size: 22px; direction: rtl; text-align: right; color: var(--text-primary); }
  .grammar-detail { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }

  .highlight-card { padding: 12px 16px; margin-top: 12px; background: linear-gradient(135deg, rgba(100,140,185,0.18), rgba(72,108,148,0.10)); border-color: var(--border-accent); }
  .highlight-label { font-size: 12px; font-weight: 700; color: var(--text-accent); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .highlight-text { font-size: 12px; color: var(--text-primary); line-height: 1.55; }

  /* ---- Root links ---- */
  .root-link {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 8px;
    margin: 0 1px;
    border-radius: 20px;
    background: var(--bg-success);
    color: var(--text-success);
    font-family: 'Amiri', serif;
    font-size: 13px;
    text-decoration: none;
    border: 0.5px solid rgba(72, 130, 100, 0.38);
    white-space: nowrap;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .root-link:hover { background: rgba(72, 130, 100, 0.28); transform: translateY(-1px); }
  .root-link::after { content: '↗'; font-family: var(--font-sans); font-size: 10px; }

  /* ---- Navigation ---- */
  .nav-row { display: flex; gap: 8px; margin-top: 16px; justify-content: space-between; }
  .nav-btn {
    cursor: pointer;
    flex: 1;
    padding: 10px 12px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface-1);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 13px;
    box-shadow: var(--glass-shadow-sm);
    transition: background 0.18s ease, transform 0.18s ease;
    min-height: 44px;
  }
  .nav-btn:hover { background: var(--surface-strong); transform: translateY(-1px); }
  .nav-btn:active { transform: translateY(0); }

  @media (max-width: 600px) {
    .nav-row { flex-wrap: wrap; }
    .nav-btn { flex: 1 1 100%; }
    .verse-card, .analysis-block, .highlight-card { padding: 14px; }
    .grammar-word { font-size: 20px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .verse-btn, .nav-btn { transition: none; }
  }
</style>
</head>
<body>

<div class="kahf-explorer">
  <a class="home-link" href="../index.html">← All Passages</a>
  <div class="explorer-header">
    <h2 class="explorer-title">Learn Arabic — Surah Al-Kahf</h2>
    <p class="explorer-subtitle">The Story of Mūsā and al-Khiḍr</p>
    <span class="surah-badge">18:60 – 82 · المقطع الثامن عشر</span>
  </div>

  <div class="verse-buttons-row" id="verse-buttons"></div>

  <div id="verse-display"></div>

  <div class="nav-row">
    <button class="nav-btn" onclick="navigate(-1)">← Previous verse</button>
    <button class="nav-btn" onclick="navigate(1)">Next verse →</button>
  </div>
</div>

<script src="data/verses.js"></script>
<script>
/* ─────────────────────────────────────────────────────────────
   ROOT LINKS — connects to kahf_root_explorer.html
   Add a line here whenever you add a new root to roots.js.

   IMPORTANT: the key here must match the root EXACTLY as it appears
   in verses.js's detail/highlight text — including spacing. The verse
   text uses the no-space form (e.g. 'ص-ب-ر'), so the keys below must
   too. The spaced form ('ص - ب - ر') is only used for on-page DISPLAY
   in roots.js's `letters` field — don't copy that format in here.
───────────────────────────────────────────────────────────── */
const ROOT_EXPLORER_URL = 'kahf_root_explorer.html';
const ROOT_LINKS = {
  'ص-ب-ر': 'sbr',
  'ع-ل-م': 'ʿlm',
  'ر-و-د': 'rwd',
  'ق-ص-ص': 'qṣṣ',
  'أ-و-ل': 'ʾwl',
  'خ-ش-ي': 'khshy',
  // Shared roots with Maryam explorer — link there instead.
  // Path must include the /maryam/ folder segment: this file lives at
  // kahf/index.html, and the target lives at maryam/maryam_root_explorer.html —
  // '../' alone only gets you back to the repo root, not into maryam/.
  'ر-ح-م': '../maryam/maryam_root_explorer.html?root=rhm',
  'س-ل-م': '../maryam/maryam_root_explorer.html?root=slm',
  // 'ع-ب-د' is intentionally NOT linked yet: there is no id:'ʿbd' entry
  // in maryam/data/roots.js. Linking to a root that doesn't exist would
  // silently fall back to Maryam's default root (rbb) instead of erroring —
  // a misleading dead end. Add the ʿbd root to maryam/data/roots.js first,
  // then add 'ع-ب-د': '../maryam/maryam_root_explorer.html?root=ʿbd' here.
};

function linkifyRoots(text) {
  let out = text;
  for (const [pattern, target] of Object.entries(ROOT_LINKS)) {
    const href = target.startsWith('../') ? target : `${ROOT_EXPLORER_URL}?root=${target}`;
    out = out.split(pattern).join(
      `<a class="root-link" href="${href}" target="_blank" rel="noopener">${pattern}</a>`
    );
  }
  return out;
}

/* ─────────────────────────────────────────────────────────────
   VERSE RANGE — 60 through 82
───────────────────────────────────────────────────────────── */
const VERSE_START = 60;
const VERSE_END   = 82;

let currentVerse = VERSE_START;

function renderVerse(n) {
  currentVerse = n;
  document.querySelectorAll('.verse-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.v) === n);
  });
  const v = verses[n];
  if (!v) return;

  const tagHtml = v.tagLabels.map((lbl, i) => {
    const cls = ['tag-verb','tag-noun','tag-particle','tag-structure','tag-rhyme'][i % 5];
    return `<span class="tag ${cls}">${lbl}</span>`;
  }).join('');

  document.getElementById('verse-display').innerHTML = `
    <div class="glass-panel verse-card">
      <div class="verse-meta">Surah Al-Kahf · Verse ${n} · Story of Mūsā and al-Khiḍr</div>
      <div class="arabic-large">${v.arabic}</div>
      <div class="verse-transliteration">${v.transliteration}</div>
      <div class="verse-translation">${v.translation}</div>
      <div style="margin-top:8px;">${tagHtml}</div>
    </div>
    <div class="verse-summary">${v.summary}</div>
    <div class="glass-panel analysis-block">
      ${v.analysis.map(a => `
        <div class="grammar-item">
          <div class="grammar-word">${a.word}</div>
          <div class="grammar-detail">${linkifyRoots(a.detail)}</div>
        </div>
      `).join('')}
    </div>
    <div class="glass-panel highlight-card">
      <div class="highlight-label">Key grammatical insight</div>
      <div class="highlight-text">${linkifyRoots(v.highlight)}</div>
    </div>
  `;
}

function navigate(dir) {
  const next = Math.max(VERSE_START, Math.min(VERSE_END, currentVerse + dir));
  renderVerse(next);
}

/* Build verse buttons 60–82 */
const btns = document.getElementById('verse-buttons');
for (let i = VERSE_START; i <= VERSE_END; i++) {
  const b = document.createElement('button');
  b.className = 'verse-btn';
  b.dataset.v = i;
  b.textContent = i;
  b.onclick = () => renderVerse(i);
  btns.appendChild(b);
}

renderVerse(VERSE_START);
</script>

</body>
</html>
